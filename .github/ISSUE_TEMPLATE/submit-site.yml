name: Submit a Site
description: Suggest a blog, website, or community for the directory
title: "[SUBMIT] Site Name"
labels: ["submission"]
body:
  - type: input
    id: name
    attributes:
      label: Site name
      placeholder: e.g. BlogR Directory
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://example.com
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Personal Writing
        - Culture & Places
        - Travel
        - Tech & Development
        - Finance, Bitcoin & Crypto
        - Forums
        - Small Communities
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      placeholder: One sentence describing the site
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this be added?
      placeholder: What makes it worth including?

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This site contains human-written content
          required: true
        - label: This is not an AI-generated content farm
          required: true
        - label: The site is active and publicly accessible
          required: true